# FILE: prometheus/alerts/postgres_alerts.yml
# PURPOSE: PostgreSQL-spezifische Alert-Regeln für TrueAngels NGO Enterprise
# TARGET: Postgres Exporter Metriken (pg_*)

groups:
  - name: postgres_health
    interval: 30s
    rules:
      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "PostgreSQL ist nicht erreichbar"
          description: "Die PostgreSQL-Datenbank ist seit {{ $value }} Sekunden nicht verfügbar. Container: postgres"

      - alert: PostgresHighConnections
        expr: pg_stat_database_numbackends > 80
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Hohe Anzahl aktiver Verbindungen"
          description: "{{ $labels.datname }} hat {{ $value }} aktive Verbindungen (Limit: 100)."

      - alert: PostgresConnectionLimit
        expr: pg_stat_database_numbackends / pg_settings_max_connections * 100 > 90
        for: 5m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Verbindungslimit fast erreicht"
          description: "Aktuelle Verbindungen: {{ $value | humanizePercentage }} des Limits (max_connections={{ $labels.max_connections }})"

      - alert: PostgresHighReplicationLag
        expr: pg_replication_lag > 60
        for: 2m
        labels:
          severity: warning
          component: replication
        annotations:
          summary: "Replikations-Lag zu hoch"
          description: "Replikation hängt {{ $value }} Sekunden hinterher."

      - alert: PostgresDeadlocks
        expr: increase(pg_stat_database_deadlocks[5m]) > 0
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Deadlocks aufgetreten"
          description: "In den letzten 5 Minuten gab es {{ $value }} Deadlocks in DB {{ $labels.datname }}."

      - alert: PostgresLowXidSpace
        expr: (pg_current_xact_id - pg_xact_age) / pg_xact_max * 100 < 10
        for: 10m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Transaction ID Space wird knapp"
          description: "Nur noch {{ $value }}% der Transaction IDs verfügbar – VACUUM FREEZE erforderlich."

      - alert: PostgresLongRunningQueries
        expr: pg_stat_activity_max_tx_duration > 300
        for: 2m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Langlaufende Transaktion"
          description: "Transaktion läuft seit {{ $value }} Sekunden (>5min) in DB {{ $labels.datname }}."

      - alert: PostgresTableBloat
        expr: (pg_table_bloat_percent > 50) and (pg_table_size > 1e9)
        for: 1h
        labels:
          severity: warning
          component: maintenance
        annotations:
          summary: "Tabellenbloat >50%"
          description: "Tabelle {{ $labels.relname }} hat {{ $value }}% Bloat – VACUUM FULL empfohlen."

      - alert: PostgresCheckpointFrequent
        expr: rate(pg_checkpoints_requested[10m]) > 5
        for: 15m
        labels:
          severity: info
          component: performance
        annotations:
          summary: "Hohe Checkpoint-Rate"
          description: "Checkpoints häufiger als erwartet – WAL-Konfiguration prüfen."
