# FILE: grafana/grafana.ini
# MODULE: Grafana Configuration for TrueAngels NGO Suite v3.0
# Server, Security, Authentication, and Plugin Settings

# ==================== Server Configuration ====================
[server]
# Protocol (http, https, socket)
protocol = http

# HTTP port
http_port = 3000

# Bind address
http_addr = 0.0.0.0

# Domain for the Grafana server
domain = monitoring.angels4ukraine.de

# Full public URL
root_url = https://monitoring.angels4ukraine.de

# Serve Grafana from subpath
serve_from_sub_path = true

# Router logging
router_logging = false

# Enable GZIP compression
enable_gzip = true

# Static root path
static_root_path = public

# CDN URL for static assets
cdn_url = 

# Maximum request size in bytes
max_request_size = 10485760

# Session timeout in minutes
session_life_time = 86400

# Graceful shutdown timeout
graceful_shutdown_timeout = 30

# ==================== Database ====================
[database]
# Use SQLite for simplicity (change to postgres for production)
type = sqlite3
path = /var/lib/grafana/grafana.db

# Max open connections
max_open_conn = 100

# Max idle connections
max_idle_conn = 100

# Connection max lifetime in seconds
conn_max_lifetime = 14400

# Log queries
log_queries = false

# For production with PostgreSQL (uncomment):
# type = postgres
# host = postgres:5432
# name = grafana
# user = grafana
# password = ${GRAFANA_DB_PASSWORD}

# ==================== Security ====================
[security]
# Disable admin creation on first start
disable_initial_admin_creation = false

# Admin user
admin_user = admin

# Admin password (change in production!)
admin_password = ${GRAFANA_ADMIN_PASSWORD:-admin}

# Secret key for signing cookies
secret_key = ${GRAFANA_SECRET_KEY}

# Allow sign up
allow_sign_up = false

# Allow organization creation
allow_org_create = false

# LDAP authentication enabled
auth_ldap_enabled = false

# Auto-assign organization role
auto_assign_org_role = Viewer

# Cookie secure flag
cookie_secure = true

# Cookie SameSite policy
cookie_samesite = lax

# Enable CSRF protection
csrf_trust_origins = https://monitoring.angels4ukraine.de
csrf_check_origin = true

# X-Frame-Options header
content_security_policy = true
content_security_policy_template = "script-src 'self' 'unsafe-eval' 'unsafe-inline'"

# ==================== Authentication ====================
[auth]
# Disable login form
disable_login_form = false

# Disable signout menu
disable_signout_menu = false

# Login cookie name
login_cookie_name = grafana_session

# Login cookie remember days
login_maximum_inactive_lifetime_days = 7
login_maximum_lifetime_days = 30

# OAuth auto-login
oauth_auto_login = false

# ==================== Basic Auth ====================
[auth.basic]
enabled = true

# ==================== Anonymous Auth ====================
[auth.anonymous]
enabled = false
org_name = Main Org.
org_role = Viewer
hide_version = true

# ==================== Google Auth (optional) ====================
[auth.google]
enabled = false
allow_sign_up = false
client_id = 
client_secret = 
scopes = https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email
auth_url = https://accounts.google.com/o/oauth2/auth
token_url = https://accounts.google.com/o/oauth2/token
allowed_domains = 

# ==================== GitHub Auth (optional) ====================
[auth.github]
enabled = false
allow_sign_up = false
client_id = 
client_secret = 
scopes = user:email,read:org
auth_url = https://github.com/login/oauth/authorize
token_url = https://github.com/login/oauth/access_token
api_url = https://api.github.com/user
allowed_organizations = 

# ==================== GitLab Auth (optional) ====================
[auth.gitlab]
enabled = false
allow_sign_up = false
client_id = 
client_secret = 
scopes = read_user
auth_url = https://gitlab.com/oauth/authorize
token_url = https://gitlab.com/oauth/token
api_url = https://gitlab.com/api/v4
allowed_groups = 

# ==================== LDAP Auth ====================
[auth.ldap]
enabled = false
config_file = /etc/grafana/ldap.toml
allow_sign_up = true

# ==================== Data Sources ====================
[datasources]
# Allow editing of datasources from UI
allow_editing = true

# ==================== Logging ====================
[log]
# Log level: debug, info, warn, error, critical
level = info

# Log format: text, console, json
format = json

# Log to console
mode = console

# Log to file
mode = file
file_path = /var/log/grafana
file_name = grafana.log
file_max_lines = 1000000
file_max_size_shift = 28
file_max_days = 7

# ==================== Metrics ====================
[metrics]
# Enable metrics endpoint
enabled = true
interval_seconds = 15

# Metrics endpoint path
path = /metrics

# Include Grafana internal metrics
basic_auth_username = 
basic_auth_password = 

[metrics.graphite]
address = 
prefix = prod.grafana.%(instance_name)s.

# ==================== Tracing ====================
[tracing.jaeger]
enabled = false
address = 
always_included_tag = 

# ==================== Alerting ====================
[alerting]
# Enable alerting
enabled = true

# Execute alerts every
execute_alerts = true
alert_manager_timeout = 5
evaluation_timeout = 5

# Notification timeout
notification_timeout_seconds = 30

# Max attempts to send notifications
max_attempts = 3

# Default webhook URL
default_webhook_url = 

# ==================== Plugins ====================
[plugins]
# Enable plugin loading
enable_alpha = false
app_tls_skip_verify_insecure = false

# Allow loading of unsigned plugins
allow_loading_unsigned_plugins = 

# Plugin directory
plugin_admin_enabled = true
plugin_catalog_url = https://grafana.com/api/plugins

# ==================== Panels ====================
[panels]
# Enable HTML in panel descriptions
disable_sanitize_html = false

# ==================== Feature Toggles ====================
[feature_toggles]
# Enable experimental features
enable = publicDashboards,newPanelChartsUI,autoMigrateOldPanels

# ==================== Date Formats ====================
[date_formats]
# Default timezone
default_timezone = Europe/Berlin

# Full date format
full_date = YYYY-MM-DD HH:mm:ss

# Interval date format
interval_second = HH:mm:ss
interval_minute = HH:mm
interval_hour = HH:mm
interval_day = MM/DD
interval_month = YYYY-MM
interval_year = YYYY

# ==================== UI Settings ====================
[ui]
# Default theme (light, dark)
default_theme = dark

# Home dashboard
homepage_url = /d/business-metrics

# Help UI
help_ui_enabled = true

# Footer links
footer_links = 

# ==================== SMTP / Email ====================
[smtp]
enabled = false
host = localhost:25
user = 
password = 
cert_file = 
key_file = 
skip_verify = false
from_address = admin@grafana.localhost
from_name = Grafana
ehlo_identity = 

# ==================== AWS (for CloudWatch) ====================
[aws]
# AWS credentials
allowed_auth_providers = default,keys,credentials
assume_role_enabled = true
list_metrics_page_limit = 500

# ==================== Azure (for Azure Monitor) ====================
[azure]
# Azure Cloud
cloud = AzurePublic

# Managed Identity
managed_identity_enabled = false
managed_identity_client_id = 

# Workload Identity
workload_identity_enabled = false
workload_identity_tenant_id = 
workload_identity_client_id = 
workload_identity_token_file = 

# ==================== Explore ====================
[explore]
# Enable Explore feature
enabled = true

# ==================== Query History ====================
[query_history]
enabled = true

# ==================== Analytics ====================
[analytics]
# Reporting enabled
reporting_enabled = false

# Feedback links enabled
feedback_links_enabled = false

# Google Analytics ID
ga_tracking_id = 

# ==================== Snapshots ====================
[snapshots]
# External snapshot enabled
external_enabled = true
external_snapshot_url = https://snapshots-origin.raintank.io
external_snapshot_name = Publish to snapshot.raintank.io

# ==================== Dashboard Versions ====================
[dashboard_versions]
# Keep dashboard versions
keep_dashboard_versions = 20

# ==================== Public Dashboards ====================
[public_dashboards]
enabled = true

# ==================== Correlation ====================
[correlations]
enabled = true

# ==================== RBAC ====================
[rbac]
enabled = true
permission_cache = true
permission_validation_enabled = true

# ==================== Anonymous Device Detection ====================
[analytics.anonymize_device_id]
enabled = false

# ==================== Database Encryption ====================
[security.encryption]
# Data encryption algorithm
algorithm = aes-cfb

# ==================== Cookie Settings ====================
[cookie]
# Cookie name prefix
name = grafana_session

# ==================== Live ====================
[live]
# Enable live WebSocket connections
max_connections = 100
allowed_origins = 
engine = 

# ==================== Logging Frontend ====================
[log.frontend]
enabled = false
sentry_dsn = 
custom_endpoint = 
sample_rate = 0.1

# ==================== Scheduler ====================
[scheduler]
# Number of workers
worker_count = 5

# ==================== Short Links ====================
[short_links]
enabled = true
