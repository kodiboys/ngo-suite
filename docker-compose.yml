# FILE: docker-compose.yml
# MODULE: Production Docker Compose mit allen Services
# Zero-Downtime Deployment, Healthchecks, Resource Limits

version: '3.8'

services:
  # ==================== Database ====================
  postgres:
    image: postgres:16-alpine
    container_name: trueangels_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-trueangels}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      postgres
      -c shared_preload_libraries='pg_stat_statements'
      -c pg_stat_statements.track=all
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=16MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-trueangels}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trueangels_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: trueangels_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_pass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - trueangels_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # ==================== API Backend ====================
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: trueangels_api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-admin}:${DB_PASSWORD:-change_me}@postgres:5432/${DB_NAME:-trueangels}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
      VAULT_ADDR: http://vault:8200
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - trueangels_network
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 1.5G
        reservations:
          cpus: '0.5'
          memory: 512M
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s

  # ==================== Celery Worker ====================
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: trueangels_celery
    environment:
      DATABASE_URL: postgresql://${DB_USER:-admin}:${DB_PASSWORD:-change_me}@postgres:5432/${DB_NAME:-trueangels}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "src.core.events.event_bus", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - trueangels_network
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 1.5G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ==================== Celery Beat (Scheduler) ====================
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: trueangels_celery_beat
    command: celery -A src.core.events.event_bus beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://${DB_USER:-admin}:${DB_PASSWORD:-change_me}@postgres:5432/${DB_NAME:-trueangels}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
    depends_on:
      - postgres
      - redis
    networks:
      - trueangels_network
    restart: unless-stopped

  # ==================== Streamlit GUI ====================
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: trueangels_streamlit
    environment:
      API_URL: http://api:8000
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - trueangels_network
    restart: unless-stopped

  # ==================== Nginx (Reverse Proxy) ====================
  nginx:
    image: nginx:alpine
    container_name: trueangels_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./public:/usr/share/nginx/html:ro
    depends_on:
      - api
      - streamlit
    networks:
      - trueangels_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ==================== HashiCorp Vault (Secrets) ====================
  vault:
    image: vault:1.13
    container_name: trueangels_vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-vault_token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    volumes:
      - vault_data:/vault/data
    networks:
      - trueangels_network
    restart: unless-stopped

  # ==================== Prometheus (Monitoring) ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: trueangels_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - trueangels_network
    restart: unless-stopped

  # ==================== Grafana (Visualization) ====================
  grafana:
    image: grafana/grafana:latest
    container_name: trueangels_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - trueangels_network
    restart: unless-stopped

  # ==================== Loki (Log Aggregation) ====================
  loki:
    image: grafana/loki:latest
    container_name: trueangels_loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - trueangels_network
    restart: unless-stopped

  # ==================== Promtail (Log Collector) ====================
  promtail:
    image: grafana/promtail:latest
    container_name: trueangels_promtail
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - trueangels_network
    restart: unless-stopped

networks:
  trueangels_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  vault_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local