<!-- FILE: public/offline.html -->
<!-- MODULE: Offline Page für PWA -->
<!-- Wird angezeigt wenn der Benutzer offline ist -->

<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Offline - TrueAngels NGO Suite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #2d6a4f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 1rem;
        }

        .offline-container {
            text-align: center;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .offline-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        p {
            font-size: 1rem;
            margin-bottom: 1.5rem;
            opacity: 0.9;
            line-height: 1.5;
        }

        .retry-btn {
            background: white;
            color: #2d6a4f;
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
            font-family: inherit;
        }

        .retry-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .info {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 1rem;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .feature {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        @media (max-width: 480px) {
            .offline-container {
                padding: 1.5rem;
            }

            h1 {
                font-size: 1.4rem;
            }

            .offline-icon {
                font-size: 4rem;
            }
        }
    </style>
</head>

<body>
    <div class="offline-container">
        <div class="offline-icon">🌐</div>
        <h1>Sie sind offline</h1>
        <p>Keine Internetverbindung verfügbar.<br>Bitte überprüfen Sie Ihre Verbindung und versuchen Sie es erneut.</p>

        <button class="retry-btn" onclick="retryConnection()">🔄 Verbindung prüfen</button>

        <div class="features">
            <span class="feature">💝 Spenden</span>
            <span class="feature">🏗️ Projekte</span>
            <span class="feature">📊 Transparenz</span>
        </div>

        <div class="info">
            Die App wird automatisch neu laden, sobald die Verbindung wiederhergestellt ist.
        </div>
    </div>

    <script>
        function retryConnection() {
            if (navigator.onLine) {
                window.location.reload();
            } else {
                alert('Keine Verbindung verfügbar. Bitte überprüfen Sie Ihre Internetverbindung.');
            }
        }

        // Automatisch neu laden wenn Verbindung wiederhergestellt ist
        window.addEventListener('online', function () {
            window.location.reload();
        });
    </script>
</body>

</html>
