# FILE: docker-compose.gui.yml
# MODULE: Docker Compose Erweiterung für Streamlit GUI

version: '3.8'

services:
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
      REDIS_URL: redis://redis:6379
    volumes:
      - ./streamlit_app.py:/app/streamlit_app.py
      - ./public:/app/public
    depends_on:
      - api
      - redis
    restart: unless-stopped
    networks:
      - trueangels_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./public:/usr/share/nginx/html
    depends_on:
      - streamlit
      - api
    networks:
      - trueangels_network

networks:
  trueangels_network:
    external: true